# Render Blueprint — deploy backend from GitHub
# Dashboard: https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: portfolio-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DB_NAME
        value: portfolio_db
      - key: RESEED_DB
        value: false
      - key: GITHUB_USERNAME
        value: vijayanuganti
      - key: MONGO_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: CONTACT_RECIPIENT_EMAIL
        sync: false
